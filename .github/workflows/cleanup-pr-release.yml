name: Cleanup PR dev releases

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete pre-releases for this branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Pass the branch name via env — never inline ${{ github.head_ref }}
          # into the script (shell-injection via a crafted branch name).
          BRANCH_RAW: ${{ github.head_ref }}
        run: |
          BRANCH=$(printf '%s' "$BRANCH_RAW" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-\{2,\}/-/g')
          # Branch dev tags are dev-v<ver>-<branch>-<run_id>, so the branch is in the
          # middle — match by regex anchored on the known, sanitised branch name.
          echo "Deleting dev builds for branch: ${BRANCH}"
          gh release list --limit 1000 --json tagName,isPrerelease \
            --jq ".[] | select(.isPrerelease and (.tagName | test(\"^dev-v[0-9]+\\\\.[0-9]+\\\\.[0-9]+-${BRANCH}-[0-9]+$\"))) | .tagName" \
          | while read -r tag; do
              echo "Deleting release and tag: ${tag}"
              gh release delete "$tag" --yes --cleanup-tag
            done
