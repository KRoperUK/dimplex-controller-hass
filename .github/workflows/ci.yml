name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the change touches the integration itself. Non-impacting changes
  # (docs, README, other workflows, etc.) skip the heavy jobs below — which, because a
  # job skipped via `if` reports "success", still satisfies the required checks so the
  # PR stays mergeable, but wastes no compute and mints no dev build.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      component: ${{ steps.filter.outputs.component }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            component:
              - 'custom_components/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'requirements_test.txt'
              - 'hacs.json'
              - '.github/workflows/ci.yml'

  conventional_commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint commit messages and PR title
        run: bash scripts/lint-commits.sh

  lint:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml

      - name: Install ruff
        # Pin to the same ruff as the test env (requirements_test.txt) so lint and
        # format can't drift between the two jobs.
        run: pip install "$(grep -E '^ruff==' requirements_test.txt)"

      - name: Lint with ruff
        # --output-format=github emits ::error annotations inline on the offending
        # lines in the PR "Files changed" view.
        run: ruff check --output-format=github custom_components/ tests/

      - name: Check formatting
        run: ruff format --check custom_components/ tests/

  # Run the full pre-commit suite to catch drift between ruff-as-pre-commit
  # (pinned in .pre-commit-config.yaml) and ruff-as-CI (pinned in
  # requirements_test.txt). The two pins must stay in sync; the
  # `Install ruff` step above uses the same version as the local install
  # but the pre-commit hooks are a separate pinned mirror.
  pre-commit:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  test:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Home Assistant requires Python >=3.14, so that's the only supported
          # runtime for this integration.
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests with coverage
        run: >-
          pytest tests/
          --cov=custom_components/dimplex --cov-branch
          --cov-report=xml --cov-report=term-missing
          --junitxml=junit.xml -o junit_family=legacy
          -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always() && env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: junit.xml

  hacs_validate:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  # Branch dev builds — a same-repo PR that changed the component, once CI is green.
  # Fork PRs get a read-only token (release would fail) and this job holds
  # contents: write, so keep it to same-repo. Never for the release-please PR branch.
  dev-release:
    needs: [changes, lint, test, hacs_validate]
    if: >-
      needs.changes.outputs.component == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Immutable head SHA (the branch can be deleted by a racing merge), with
          # full history + tags for the changelog action.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute next version
        id: nextver
        uses: TriPSs/conventional-changelog-action@952b14bbc4be87e8458a6ac5926fc655608b1b19 # v6
        with:
          github-token: ${{ github.token }}
          version-file: custom_components/dimplex/manifest.json
          version-path: version
          tag-prefix: v
          preset: conventionalcommits
          skip-on-empty: true
          skip-version-file: true
          skip-commit: true
          skip-tag: true
          skip-git-pull: true
          git-push: false
          output-file: false

      - name: Compute dev tag
        id: tag
        env:
          SKIPPED: ${{ steps.nextver.outputs.skipped }}
          NEXT_VERSION: ${{ steps.nextver.outputs.version }}
          HEAD_BRANCH: ${{ github.head_ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$SKIPPED" = "true" ] || [ -z "$NEXT_VERSION" ]; then
            VERSION=$(jq -r .version custom_components/dimplex/manifest.json)
          else
            VERSION="$NEXT_VERSION"
          fi
          WORKFLOW_EVENT=pull_request
          export VERSION HEAD_BRANCH RUN_ID WORKFLOW_EVENT
          TAG=$(bash scripts/compute-dev-tag.sh)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create pre-release
        id: prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          BRANCH_RAW: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Must pin the tag to the PR head SHA. Without --target, `gh release create`
          # defaults to the repo default branch (main), so HACS/installers get main's
          # tree instead of the PR commit advertised in the release notes.
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          # Predicted next version (no leading v), for the admonition text.
          NEXT_VERSION: ${{ steps.nextver.outputs.version }}
          SKIPPED: ${{ steps.nextver.outputs.skipped }}
        run: |
          set -euo pipefail
          if [ -z "${COMMIT_SHA}" ]; then
            echo "COMMIT_SHA is empty; refusing to create an untargeted release."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "${SKIPPED:-}" = "true" ] || [ -z "${NEXT_VERSION:-}" ]; then
            PREVIEW_VERSION=$(jq -r .version custom_components/dimplex/manifest.json)
          else
            PREVIEW_VERSION="$NEXT_VERSION"
          fi

          # Ensure main is available for the commit list (checkout may only have PR head).
          git fetch origin main --depth=50 2>/dev/null || true

          if gh release view "$TAG" >/dev/null 2>&1; then
            # Existing tag must already point at this PR head; otherwise delete and recreate.
            existing_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha' 2>/dev/null || true)
            # Annotated tags resolve to a tag object; peel to the commit.
            object_type=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.type' 2>/dev/null || true)
            if [ "$object_type" = "tag" ] && [ -n "$existing_sha" ]; then
              existing_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${existing_sha}" --jq '.object.sha' 2>/dev/null || true)
            fi
            if [ "$existing_sha" = "$COMMIT_SHA" ]; then
              echo "Release ${TAG} already targets ${COMMIT_SHA}; keeping."
              echo "available=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Release ${TAG} points at ${existing_sha:-unknown}, expected ${COMMIT_SHA}; recreating."
            gh release delete "$TAG" --yes --cleanup-tag || true
          fi

          latest_stable=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
          if [ -n "$latest_stable" ]; then
            stable_line="For everyday use, install the latest **stable** release instead: [\`${latest_stable}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${latest_stable})."
          else
            stable_line="No stable release has been published yet."
          fi

          short_sha=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          {
            echo "> [!WARNING]"
            echo "> **This is an automated pre-merge development build, not an official release.**"
            echo "> It is built from PR [#${PR_NUMBER}](${PR_URL}) (\`${BRANCH_RAW}\`) at commit [\`${short_sha}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA}) and may be unstable."
            echo "> It is **not** a \`main\` release-candidate; do not treat it as production-ready."
            echo "> ${stable_line}"
            echo ""
            echo "## Pull request"
            echo ""
            echo "- **Title:** ${PR_TITLE}"
            echo "- **PR:** [#${PR_NUMBER}](${PR_URL})"
            echo "- **Branch:** \`${BRANCH_RAW}\`"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA})"
            echo "- **Preview of:** upcoming **v${PREVIEW_VERSION}** (after merge to \`main\`)"
            echo ""
            echo "## Commits on this branch"
            echo ""
            # Commits unique to the PR head vs the base branch (main).
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              git log --no-merges --pretty=format:'* %s ([%h](https://github.com/'"${GITHUB_REPOSITORY}"'/commit/%H))' \
                "origin/main..${COMMIT_SHA}"
              echo ""
            else
              echo "_Could not resolve \`origin/main\` for a commit list._"
            fi
          } > pr-dev-notes.md

          gh release create "$TAG" \
            --prerelease \
            --title "$TAG" \
            --target "$COMMIT_SHA" \
            --notes-file pr-dev-notes.md

          bash scripts/verify-dev-release-target.sh
          echo "Created ${TAG} -> ${COMMIT_SHA}"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Label PR as dev-release-cut
        if: steps.prerelease.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ! gh label list --repo "$GITHUB_REPOSITORY" --json name --jq '.[].name' | grep -Fxq "dev-release-cut"; then
            gh label create "dev-release-cut" --repo "$GITHUB_REPOSITORY" \
              --color "5319e7" --description "A dev/RC pre-release was published for this PR" || true
          fi
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "dev-release-cut"

  # Main release-candidate dev builds — a push to main that changed the component,
  # once CI is green. Never for the "chore(main): release X.Y.Z" commit (matched via
  # ": release ") which release-please lands when its PR merges.
  dev-release-main:
    needs: [changes, lint, test, hacs_validate]
    if: >-
      needs.changes.outputs.component == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, ': release ')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Compute next version
        id: nextver
        uses: TriPSs/conventional-changelog-action@952b14bbc4be87e8458a6ac5926fc655608b1b19 # v6
        with:
          github-token: ${{ github.token }}
          version-file: custom_components/dimplex/manifest.json
          version-path: version
          tag-prefix: v
          preset: conventionalcommits
          skip-on-empty: true
          skip-version-file: true
          skip-commit: true
          skip-tag: true
          skip-git-pull: true
          git-push: false
          output-file: false

      - name: Compute dev tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          SKIPPED: ${{ steps.nextver.outputs.skipped }}
          NEXT_VERSION: ${{ steps.nextver.outputs.version }}
        run: |
          if [ "$SKIPPED" = "true" ] || [ -z "$NEXT_VERSION" ]; then
            VERSION=$(jq -r .version custom_components/dimplex/manifest.json)
          else
            VERSION="$NEXT_VERSION"
          fi
          # If this version is already fully released, remove any leftover RC
          # pre-releases for it and skip creating a new RC build.
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Full release v${VERSION} exists; deleting matching RC pre-releases."
            gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | { grep -E "^dev-v${VERSION}-rc\.?[0-9]+$" || true; } \
            | while read -r tag; do
                echo "Deleting stale RC pre-release: ${tag}"
                gh release delete "$tag" --yes --cleanup-tag
              done
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Incrementing RC number for this version: highest existing dev-v<ver>-rcN + 1, so
          # builds are rc1, rc2, rc3, ... (resets to rc1 when the next version bumps, since no
          # dev-v<new>-rc* exist yet). A plain grep over the release tag names avoids jq's
          # string-escaping pitfalls — an unescaped "\." inside a jq string is an invalid
          # escape and made the previous jq `test()` fail, so it always computed rc1.
          highest_rc=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | grep -E "^dev-v${VERSION}-rc\.[0-9]+$" | sed -E 's/^.*-rc\.//' | sort -n | tail -1 || true)
          RC_NUMBER=$(( ${highest_rc:-0} + 1 ))
          HEAD_BRANCH=main
          WORKFLOW_EVENT=push
          export VERSION RC_NUMBER HEAD_BRANCH WORKFLOW_EVENT
          TAG=$(bash scripts/compute-dev-tag.sh)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Prune superseded main RC pre-releases
        if: ${{ steps.tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # On main there should only be RC builds for the *current* next-version. When a
          # new feat/fix bumps the computed version (e.g. 3.2.1 -> 3.3.0), the earlier
          # dev-v<old>-rc* builds are superseded and will never ship — delete them now
          # rather than waiting for a real release or the 30-day sweep.
          gh release list --limit 1000 --json tagName --jq '.[].tagName' \
          | { grep -E '^dev-v[0-9]+\.[0-9]+\.[0-9]+-rc\.?[0-9]+$' || true; } \
          | while read -r tag; do
              tag_version="${tag#dev-v}"
              tag_version="${tag_version%-rc*}"
              if [ "$tag_version" != "$VERSION" ]; then
                echo "Deleting superseded RC pre-release: ${tag} (version ${tag_version} != ${VERSION})"
                gh release delete "$tag" --yes --cleanup-tag
              fi
            done

      - name: Create pre-release
        if: ${{ steps.tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          # Release-please-style changelog for the changes since the last stable release.
          CHANGELOG: ${{ steps.nextver.outputs.clean_changelog }}
        run: |
          # Latest published stable (non-prerelease, non-draft) release, to steer users away
          # from RC builds. Empty if none has shipped yet.
          latest_stable=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
          if [ -n "$latest_stable" ]; then
            stable_line="For everyday use, install the latest **stable** release instead: [\`${latest_stable}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${latest_stable})."
          else
            stable_line="No stable release has been published yet."
          fi
          {
            echo "> [!WARNING]"
            echo "> **This is an automated release-candidate build, not an official release.**"
            echo "> It previews the upcoming **v${VERSION}** release from \`main\` (commit \`${COMMIT_SHA}\`) and may be unstable."
            echo "> ${stable_line}"
            echo ""
            echo "## What's changed for v${VERSION}"
            echo ""
            if [ -n "${CHANGELOG}" ]; then
              printf '%s\n' "${CHANGELOG}"
            else
              echo "_No user-facing changes detected since the last release._"
            fi
          } > rc-notes.md
          # Pin the RC tag to this push's commit. Without --target, gh defaults to
          # the repository default branch tip, which can race with later pushes.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for this tag, skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --prerelease \
            --title "$TAG" \
            --target "$COMMIT_SHA" \
            --notes-file rc-notes.md
          bash scripts/verify-dev-release-target.sh
