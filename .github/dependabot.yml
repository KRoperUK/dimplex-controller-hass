version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      # Bundle low-risk minor/patch bumps into a single PR; majors stay separate
      # so they get individual review.
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
