repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
        # HA blueprints use !input tags that are not plain YAML.
        exclude: ^blueprints/
      - id: check-json
        # VS Code config files are JSONC (allow comments/trailing commas).
        exclude: ^\.vscode/
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: local
    hooks:
      # Canonicalise HA manifests (domain/name first, then alpha; indent=2).
      # Must match release-please's JSON rewriter so release PRs stay green.
      # Prettier deliberately skips these files — see .prettierignore.
      - id: format-ha-manifest
        name: format Home Assistant manifest.json
        entry: python3 scripts/format_manifest.py
        language: system
        files: ^custom_components/[^/]+/manifest\.json$
        pass_filenames: true
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.2.1
    hooks:
      - id: prettier
